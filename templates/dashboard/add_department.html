{% extends 'dashboard/dashboard_base.html' %}

{% block admin_content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="flex-between mb-4">
        <h2 style="font-size: 1.5rem; font-weight: 700;">Add New Department</h2>
        <a href="{% url 'departments_admin' %}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left" style="margin-right: 0.5rem;"></i> Back
        </a>
    </div>

    <div class="card">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <small style="display: block; color: var(--text-muted); font-size: 0.75rem; margin-top: 0.25rem;">{{ field.help_text }}</small>
                {% endif %}
                {% if field.errors %}
                <span style="color: var(--danger-color); font-size: 0.75rem;">{{ field.errors.0 }}</span>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-full">Initialize Department</button>
        </form>
    </div>
</div>
{% endblock %}
